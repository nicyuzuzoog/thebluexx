<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Brand gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4FFF"/>
      <stop offset="100%" stop-color="#00C26F"/>
    </linearGradient>
    <!-- Shine effect -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(27,79,255,0.4)"/>
    </filter>
  </defs>

  <!-- Rounded background with gradient -->
  <rect
    width="100" height="100"
    rx="24" ry="24"
    fill="url(#bg)"
    filter="url(#shadow)"
  />

  <!-- Shine overlay on top half -->
  <rect
    width="100" height="54"
    rx="24" ry="24"
    fill="url(#shine)"
  />

  <!-- Letter B centered -->
  <text
    x="52"
    y="70"
    font-family="Arial Black, Arial, sans-serif"
    font-size="60"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    opacity="1"
  >B</text>

  <!-- Small dot accent bottom right -->
  <circle cx="76" cy="76" r="8" fill="#00C26F" opacity="0.9"/>
  <circle cx="76" cy="76" r="4" fill="white" opacity="0.9"/>
</svg>